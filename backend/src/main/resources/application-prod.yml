# =========================================================================
# CONFIGURACIÓN ESTRICTA DE PRODUCCIÓN / ENTORNO SEGURO
# Se activa en el contenedor mediante: SPRING_PROFILES_ACTIVE=prod
# =========================================================================
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:}

spring:
  # Desactivar rastro de consultas SQL en la salida estándar de logs por rendimiento y seguridad
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Credenciales de administración por defecto para endpoints protegidos en prod (si aplica)
  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:secure_admin_password_2026}

# =============================================
# RESTRICCIÓN DE LOGS EN PRODUCCIÓN (Evita saturar el disco)
# =============================================
logging:
  level:
    root: WARN
    com.puntomartinez: INFO